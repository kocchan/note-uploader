name: Daily Trend Collection

on:
  schedule:
    # 毎日 8:00 JST (23:00 UTC previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 手動実行用

env:
  TZ: Asia/Tokyo

jobs:
  collect-trends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Run Strategy Planner Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_TEAM_ID: ${{ secrets.SLACK_TEAM_ID }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          claude -p "
          あなたは戦略プランナーエージェントです。以下のタスクを実行してください：

          ## 手順

          1. .claude/rules/strategy-rules.md を読んで戦略ルールを確認
          2. .claude/rules/ai-learnings.md を読んで過去の学びを確認
          3. ADHD × AI活用をテーマに、記事テーマを3案作成
          4. Slack MCP を使って #note-business チャンネル（$SLACK_CHANNEL）に投稿

          ## テーマ案の形式

          各テーマには以下を含める：
          - タイトル
          - ターゲット
          - 提供価値
          - 需要レベル（高/中/低）
          - 競合状況（多/中/少）
          - 選んだ理由

          ## Slack 投稿形式

          以下の形式でメッセージを投稿:

          ---
          📝 **本日のテーマ提案**

          **1️⃣ テーマ名**
          - ターゲット: ...
          - 提供価値: ...
          - 需要: 高 / 競合: 中
          - 理由: ...

          **2️⃣ テーマ名**
          ...

          **3️⃣ テーマ名**
          ...

          リアクションで選択してください！
          🔄 再提案 / ⏸️ 保留
          ---

          ## 手順詳細

          1. slack_post_message でメッセージを投稿
          2. 投稿後、slack_add_reaction で以下のリアクションを追加:
             - one (1️⃣)
             - two (2️⃣)
             - three (3️⃣)
             - arrows_counterclockwise (🔄)
             - double_vertical_bar (⏸️)

          ## 重要
          - 必ず Slack MCP のツールを使うこと
          - チャンネルID: $SLACK_CHANNEL
          " --mcp-config mcp.json --dangerously-skip-permissions

      - name: Commit any updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ .claude/rules/ || true
          git diff --staged --quiet || git commit -m "Update from daily trend $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
