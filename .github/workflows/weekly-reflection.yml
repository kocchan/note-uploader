name: Weekly Reflection

on:
  schedule:
    # 毎週月曜 9:00 JST (00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 手動実行用

env:
  TZ: Asia/Tokyo

jobs:
  reflection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Run Reflection Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_TEAM_ID: ${{ secrets.SLACK_TEAM_ID }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          claude -p "
          あなたは振り返りエージェントです。以下のタスクを実行してください：

          ## 手順

          1. output/x_posts/post_history.md を読んで投稿履歴を確認
          2. rules/ai-learnings.md を読んで過去の学びを確認
          3. rules/strategy-rules.md を読んで現在の戦略を確認
          4. 週次振り返りレポートを作成
          5. Slack MCP を使って #note-business チャンネル（$SLACK_CHANNEL）に投稿

          ## レポートに含める内容
          - サマリー（2-3文）
          - 達成したこと
          - 課題
          - 学び
          - 来週の注力ポイント
          - 戦略更新の提案（あれば）

          ## Slack 投稿形式

          以下の形式でメッセージを投稿:

          ---
          📊 **週次振り返りレポート**

          **サマリー**
          ...

          **✅ 達成したこと**
          - ...

          **⚠️ 課題**
          - ...

          **💡 学び**
          - ...

          **🎯 来週の注力ポイント**
          - ...

          **📝 戦略更新の提案**
          - ...

          リアクションで対応を選択してください！
          ---

          ## 手順詳細

          1. slack_post_message でメッセージを投稿
          2. 投稿後、slack_add_reaction で以下のリアクションを追加:
             - memo (📝) - 学びをai-learnings.mdに追記
             - white_check_mark (✅) - 戦略ルールを更新
             - thumbsup (👍) - 確認のみ

          ## 重要
          - 必ず Slack MCP のツールを使うこと
          - チャンネルID: $SLACK_CHANNEL
          " --mcp-config mcp.json --dangerously-skip-permissions

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ rules/ || true
          git diff --staged --quiet || git commit -m "Add weekly reflection $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
