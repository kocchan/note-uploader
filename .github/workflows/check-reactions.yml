name: Check Slack Reactions & Execute

on:
  schedule:
    # 毎時0分にチェック (JST 9:00-23:00 のみ実行するようにスクリプト内で制御)
    - cron: '0 * * * *'
  workflow_dispatch:  # 手動実行用

env:
  TZ: Asia/Tokyo

jobs:
  check-and-execute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install slack-sdk tweepy python-dotenv

      - name: Check Slack reactions and execute
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python scripts/check_slack_reactions.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Update post history $(date +%Y-%m-%d\ %H:%M)"
          git push || echo "Nothing to push"
