name: Daily X Post Suggestions

on:
  schedule:
    # 毎日 12:00 JST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:  # 手動実行用

env:
  TZ: Asia/Tokyo

jobs:
  suggest-tweets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic slack-sdk python-dotenv

      - name: Generate tweet suggestions
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_tweets.py > tweets.json
          cat tweets.json

      - name: Post to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          python scripts/post_to_slack.py tweets.json

      - name: Save tweet data for later
        run: |
          mkdir -p output/pending_tweets
          cp tweets.json output/pending_tweets/$(date +%Y%m%d).json

      - name: Commit pending tweets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/pending_tweets/
          git diff --staged --quiet || git commit -m "Add pending tweets for $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
