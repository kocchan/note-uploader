name: Daily X Post Suggestions

on:
  schedule:
    # 毎日 12:00 JST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:  # 手動実行用

env:
  TZ: Asia/Tokyo

jobs:
  suggest-tweets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install slack-sdk

      - name: Run X Manager Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          claude -p "
          あなたはX運用エージェントです。以下のタスクを実行してください：

          ## 手順

          1. rules/x-posting-rules.md を読んでルールを確認
          2. rules/strategy-rules.md を読んで戦略を確認
          3. output/articles/ フォルダを確認し、宣伝する記事があるか確認
          4. ツイート案を2-3個作成（記事があれば宣伝ツイート、なければ日常ツイート）
          5. /slack-ask スキルの手順に従って、Slackにツイート案を投稿

          ## 重要
          - /slack-ask の SKILL.md を必ず読んで、正しい形式でSlackに投稿すること
          - 環境変数 SLACK_BOT_TOKEN と SLACK_CHANNEL を使用すること
          - output/pending/ にJSONを保存すること
          - Slackに投稿したらこのタスクは完了（人間の承認は別ワークフローで処理）
          " --dangerously-skip-permissions

      - name: Commit pending data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/pending/ || true
          git diff --staged --quiet || git commit -m "Add pending tweets $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
