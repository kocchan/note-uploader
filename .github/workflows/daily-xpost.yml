name: Daily X Post Suggestions

on:
  schedule:
    # 毎日 12:00 JST (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:  # 手動実行用

env:
  TZ: Asia/Tokyo

jobs:
  suggest-tweets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install tweepy

      - name: Run X Manager Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_TEAM_ID: ${{ secrets.SLACK_TEAM_ID }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          claude -p "
          あなたはX運用エージェントです。以下のタスクを実行してください：

          ## 手順

          1. rules/x-posting-rules.md を読んでルールを確認
          2. rules/strategy-rules.md を読んで戦略を確認
          3. output/articles/ フォルダを確認し、宣伝する記事があるか確認
          4. ツイート案を2-3個作成（記事があれば宣伝ツイート、なければ日常ツイート）
          5. Slack MCP を使って #note-business チャンネル（$SLACK_CHANNEL）に投稿

          ## Slack 投稿形式

          以下の形式でメッセージを投稿:

          ---
          🐦 **本日のツイート提案**

          【案1】📢 記事宣伝
          \`\`\`
          ツイート本文...
          \`\`\`

          【案2】💡 日常ツイート
          \`\`\`
          ツイート本文...
          \`\`\`

          ✅ 承認 / ❌ 却下 / ✏️ 修正依頼
          ---

          ## 手順詳細

          1. slack_post_message でメッセージを投稿
          2. 投稿後、slack_add_reaction で以下のリアクションを追加:
             - white_check_mark (✅)
             - x (❌)
             - pencil (✏️)

          ## 重要
          - 必ず Slack MCP のツールを使うこと
          - チャンネルID: $SLACK_CHANNEL
          - 投稿が完了したらこのタスクは終了（人間の承認は別ワークフローで処理）
          " --mcp-config mcp.json --dangerously-skip-permissions

      - name: Commit any updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ || true
          git diff --staged --quiet || git commit -m "Update from daily xpost $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
